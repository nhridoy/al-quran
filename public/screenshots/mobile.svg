  </defs>
  <rect width="414" height="896" fill="url(#bg)" rx="40"/>
  <!-- Status bar -->
  <rect x="0" y="0" width="414" height="44" fill="rgba(0,0,0,0.3)"/>
  <text x="30" y="28" fill="rgba(255,255,255,0.6)" font-family="system-ui" font-size="12">9:41</text>
  <!-- Header -->
