  <text x="30" y="78" fill="white" font-family="system-ui" font-size="18" font-weight="bold">Al Quran</text>
  <rect x="330" y="58" width="56" height="28" rx="14" fill="rgba(255,255,255,0.08)"/>
  <text x="344" y="76" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="10">⌘K</text>
