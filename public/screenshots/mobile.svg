  <text x="52" y="865" fill="#A078FF" font-family="system-ui" font-size="20" text-anchor="middle">📖</text>
  <text x="52" y="882" fill="#A078FF" font-family="system-ui" font-size="9" text-anchor="middle">Surah</text>
  <text x="145" y="865" fill="rgba(255,255,255,0.4)" font-family="system-ui" font-size="20" text-anchor="middle">📗</text>
  <text x="145" y="882" fill="rgba(255,255,255,0.4)" font-family="system-ui" font-size="9" text-anchor="middle">Para</text>
  <text x="238" y="865" fill="rgba(255,255,255,0.4)" font-family="system-ui" font-size="20" text-anchor="middle">⚙️</text>
  <text x="238" y="882" fill="rgba(255,255,255,0.4)" font-family="system-ui" font-size="9" text-anchor="middle">Settings</text>
