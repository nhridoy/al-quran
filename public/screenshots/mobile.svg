  <text x="76" y="340" fill="white" font-family="system-ui" font-size="14" font-weight="600">Al-Baqarah</text>
  <text x="76" y="358" fill="rgba(255,255,255,0.35)" font-family="system-ui" font-size="11">The Cow</text>
  <text x="360" y="348" fill="rgba(255,255,255,0.4)" font-family="system-ui" font-size="11" text-anchor="end" font-style="italic">البقرة</text>
  <rect x="20" y="376" width="374" height="60" rx="14" fill="url(#card)"/>
  <rect x="36" y="392" width="28" height="28" rx="14" fill="rgba(255,255,255,0.06)"/>
  <text x="50" y="411" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="11" text-anchor="middle">3</text>
  <text x="76" y="404" fill="white" font-family="system-ui" font-size="14" font-weight="600">Ali 'Imran</text>
  <text x="76" y="422" fill="rgba(255,255,255,0.35)" font-family="system-ui" font-size="11">Family of Imran</text>
