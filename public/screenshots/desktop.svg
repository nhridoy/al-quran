  <rect x="280" y="176" width="924" height="64" rx="14" fill="url(#card)"/>
  <rect x="296" y="194" width="28" height="28" rx="14" fill="rgba(255,255,255,0.06)"/>
  <text x="310" y="213" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="11" text-anchor="middle">1</text>
  <text x="340" y="204" fill="white" font-family="system-ui" font-size="15" font-weight="600">Al-Fatiha</text>
  <text x="340" y="224" fill="rgba(255,255,255,0.35)" font-family="system-ui" font-size="12">The Opening · 7 verses</text>
  <text x="1160" y="214" fill="rgba(255,255,255,0.4)" font-family="system-ui" font-size="14" text-anchor="end" font-style="italic">الفاتحة</text>
  <rect x="280" y="248" width="924" height="64" rx="14" fill="url(#card)"/>
  <rect x="296" y="266" width="28" height="28" rx="14" fill="rgba(255,255,255,0.06)"/>
  <text x="310" y="285" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="11" text-anchor="middle">2</text>
  <text x="340" y="276" fill="white" font-family="system-ui" font-size="15" font-weight="600">Al-Baqarah</text>
  <text x="340" y="296" fill="rgba(255,255,255,0.35)" font-family="system-ui" font-size="12">The Cow · 286 verses</text>
  <text x="1160" y="286" fill="rgba(255,255,255,0.4)" font-family="system-ui" font-size="14" text-anchor="end" font-style="italic">البقرة</text>
  <rect x="280" y="320" width="924" height="64" rx="14" fill="url(#card)"/>
  <rect x="296" y="338" width="28" height="28" rx="14" fill="rgba(255,255,255,0.06)"/>
  <text x="310" y="357" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="11" text-anchor="middle">3</text>
  <text x="340" y="348" fill="white" font-family="system-ui" font-size="15" font-weight="600">Ali 'Imran</text>
  <text x="340" y="368" fill="rgba(255,255,255,0.35)" font-family="system-ui" font-size="12">Family of Imran · 200 verses</text>
  <text x="1160" y="358" fill="rgba(255,255,255,0.4)" font-family="system-ui" font-size="14" text-anchor="end" font-style="italic">آل عمران</text>
  <rect x="280" y="392" width="924" height="64" rx="14" fill="url(#card)"/>
  <rect x="296" y="410" width="28" height="28" rx="14" fill="rgba(255,255,255,0.06)"/>
  <text x="310" y="429" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="11" text-anchor="middle">4</text>
  <text x="340" y="420" fill="white" font-family="system-ui" font-size="15" font-weight="600">An-Nisa</text>
  <text x="340" y="440" fill="rgba(255,255,255,0.35)" font-family="system-ui" font-size="12">The Women · 176 verses</text>
  <text x="1160" y="430" fill="rgba(255,255,255,0.4)" font-family="system-ui" font-size="14" text-anchor="end" font-style="italic">النساء</text>
  <rect x="280" y="464" width="924" height="64" rx="14" fill="url(#card)"/>
  <rect x="296" y="482" width="28" height="28" rx="14" fill="rgba(255,255,255,0.06)"/>
  <text x="310" y="501" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="11" text-anchor="middle">5</text>
  <text x="340" y="492" fill="white" font-family="system-ui" font-size="15" font-weight="600">Al-Ma'idah</text>
  <text x="340" y="512" fill="rgba(255,255,255,0.35)" font-family="system-ui" font-size="12">The Table · 120 verses</text>
  <text x="1160" y="502" fill="rgba(255,255,255,0.4)" font-family="system-ui" font-size="14" text-anchor="end" font-style="italic">المائدة</text>
</svg>
